<mat-card>
  <mat-card-header>
    <mat-card-title>Login</mat-card-title>
  </mat-card-header>
  <form [formGroup]="loginForm" (ngSubmit)="loginFormSubmit()">
    <mat-card-content>
      <mat-form-field class="example-full-width">
        <mat-label>Favorite food</mat-label>
        <input matInput formControlName="username" placeholder="Username" value="Sushi">
      </mat-form-field>
    </mat-card-content>
    <mat-card-actions>
      <button mat-raised-button color="primary" type="submit" [disabled]="!loginForm.valid">Login</button>
    </mat-card-actions>
  </form>
</mat-card>
